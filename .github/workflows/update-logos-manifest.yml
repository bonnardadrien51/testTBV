name: Update logos manifest

on:
  push:
    paths:
      - 'docs/partenaires/**'
      - 'docs/partenaires-financiers/**'
  schedule:
    - cron: '0 4 * * *'   # Tous les jours à 04:00 UTC (~06:00 en France l'été)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Générer les manifestes de logos
        run: |
          for dir in docs/partenaires docs/partenaires-financiers; do
            mkdir -p "$dir"

            files=$(find "$dir" -maxdepth 1 -type f \
              \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' \
                 -o -iname '*.svg' -o -iname '*.webp' -o -iname '*.gif' \) \
              -exec basename {} \; | sort)

            if [ -z "$files" ]; then
              echo "[]" > "$dir/manifest.json"
            else
              printf '%s\n' "$files" | jq -R . | jq -s . > "$dir/manifest.json"
            fi
          done

      - name: Committer les changements si nécessaire
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/partenaires/manifest.json docs/partenaires-financiers/manifest.json

          if ! git diff --cached --quiet; then
            git commit -m "Mise à jour automatique des manifestes de logos"
            git push
          else
            echo "Aucune modification à enregistrer."
          fi
