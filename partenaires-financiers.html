<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Nos partenaires financiers</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      font-family: Arial, sans-serif;
    }
    h1 {
      margin: 20px 0;
      text-align: center;
      color: #1a1a1a;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 30px;
      padding: 20px 40px;
      max-width: 1600px;
    }
    .grid img {
      max-width: 260px;
      max-height: 160px;
      object-fit: contain;
    }
    .empty {
      color: #888;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <h1>Nos partenaires financiers</h1>
  <div class="grid" id="logos">
    <p class="empty">Chargement des logos…</p>
  </div>

  <script>
    // Dossier contenant les logos et le manifest.json généré par la GitHub Action
    const FOLDER = "partenaires-financiers";
    // Recharge la page automatiquement une fois par jour
    const REFRESH_MS = 24 * 60 * 60 * 1000;

    async function loadLogos() {
      const container = document.getElementById("logos");
      try {
        // Cache-buster pour être sûr de récupérer la dernière version du manifest
        const res = await fetch(`${FOLDER}/manifest.json?t=${Date.now()}`);
        if (!res.ok) throw new Error("manifest.json introuvable");
        const files = await res.json();

        if (!files || files.length === 0) {
          container.innerHTML = `<p class="empty">Aucun logo trouvé dans le dossier "${FOLDER}".</p>`;
          return;
        }

        container.innerHTML = "";
        files.forEach((name) => {
          const el = document.createElement("img");
          el.src = `${FOLDER}/${name}`;
          el.alt = name.replace(/\.[^.]+$/, "");
          container.appendChild(el);
        });
      } catch (err) {
        container.innerHTML = `<p class="empty">Erreur de chargement des logos.</p>`;
        console.error(err);
      }
    }

    loadLogos();
    setInterval(() => window.location.reload(), REFRESH_MS);
  </script>
</body>
</html>
